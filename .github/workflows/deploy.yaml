name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "The github environment to deploy against."

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

jobs:
  build-lambda-package:
    name: Build Lambda Deployment Package
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup Python 3.13
      uses: actions/setup-python@v7
      with:
        python-version: '3.13'
    - name: Setup uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
    - name: Run build script
      run: ./create_lambda_package.sh
      shell: bash
    - name: Upload Lambda Deployment Packages
      uses: actions/upload-artifact@v7
      with:
        name: lambda_build
        path: |
          apple_web_scrape.zip
          apple_send_update.zip

  terraform-deploy:
    name: Deploy Terraform to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [build-lambda-package]
    environment: ${{ inputs.environment }}

    # Use the Bash shell regardless whether the GitHub Actions runner is ubuntu-latest, macos-latest, or windows-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v6

    - name: Download all workflow run artifacts
      uses: actions/download-artifact@v6
      with:
        path: ./terraform

    - name: Move Lambda packages to terraform directory
      run: |
        echo "Checking artifact structure:"
        ls -la .
        echo ""
        if [ -d "lambda_build" ]; then
          echo "Found lambda_build directory, listing contents:"
          ls -la lambda_build/
          echo "Moving .zip files..."
          mv lambda_build/*.zip . 2>/dev/null || {
            echo "No .zip files in lambda_build root, searching subdirectories..."
            find lambda_build -name '*.zip' -exec mv {} . \;
          }
        else
          echo "No lambda_build directory found, checking current directory:"
          ls -la *.zip 2>/dev/null || echo "No .zip files found"
        fi
        echo ""
        echo "Final contents:"
        ls -lh *.zip

    # Configure AWS Creds
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/GitHubActionsTerraformDeploymentRole-${{ vars.REGION }}-${{ vars.ACCOUNT_ID }}
        role-session-name: terraform-deployment-${{ vars.REGION }}-${{ vars.ACCOUNT_ID }}
        aws-region: ${{ vars.REGION }}

    # Install the latest version of Terraform CLI
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    - name: Show deployment environment
      run: |
        echo "GitHub Environment: ${{ inputs.environment }}"
        echo "Terraform Env (branch-based): ${GITHUB_REF_NAME}"

    # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
    - name: Terraform Init
      id: init
      run: terraform init -backend-config=backend.${GITHUB_REF_NAME}.conf
      continue-on-error: false

    # Checks that all Terraform configuration files adhere to a canonical format
    - name: Terraform Format
      id: fmt
      run: terraform fmt -check
      continue-on-error: false

    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color
      continue-on-error: false

    # On push to "main" or "develop", run a plan to see infrastructure according to Terraform configuration files
    - name: Terraform Plan
      id: plan
      run: terraform plan -var-file=${GITHUB_REF_NAME}.tfvars -out=tfplan

      # On push to "main" or "develop", build or change infrastructure according to Terraform configuration files
    - name: Terraform Apply
      id: apply
      run: terraform apply "tfplan"